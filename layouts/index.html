{{ define "main" }}
  <div class="homepage-container" style="text-align: center; padding: 50px;">

    {{ with .Params.profile_image }}
      <img src="{{ . | relURL }}" alt="Profile Picture" style="width:150px; height:150px; border-radius:50%;">
    {{ end }}

    <h1>{{ .Title }}</h1>

    {{ with .Params.subtitle }}
      <p>{{ . }}</p>
    {{ end }}

    <hr>

    <div class="content">
      {{ .Content }}
    </div>

  </div>
{{ end }}
